title: Amandeep Singh Khanna
baseurl: ''
url: amandeepsinghkhanna.com
google_analytics: G-PYQ4ZZQ3QD
markdown: kramdown
include:
  - _pages
sass:
  sass_dir: _sass
  style: compressed
plugins:
  - jekyll-paginate
permalink: '/:title/:year-:month-:day/'
paginate: 10
collections:
  recipes:
    output: true
    sort_by: recipe_count
    permalink: '/:collection/:name/'
  projects:
    output: true
    sort_by: project_count
    permalink: '/:collection/:name/'
  songbook:
    output: true
    sort_by: song_count
    permalink: '/:collection/:name/'
