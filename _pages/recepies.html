---
title: "Recipes"
layout: about_template
permalink: /recipes/
---
<style>
  #list{
    list-style-type: none;
  }
</style>
<script type="text/javascript" src="{{ "/assets/js/paginator.js" | relative_url }}"></script>
<div class="catalogue">
  <ul id="list">
    {% for recipe in site.recipes %}
    <li>
      <a href="{{ recipe.url | prepend: site.baseurl }}" class="catalogue-item">
        <h1 class="catalogue-title">{{ recipe.title}}</h1>
        <div class="catalogue-line"></div>
        <p>
          {{ recipe.content | strip_html | truncatewords: 30 }}
        </p>
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
<div class="pagination-container">
   <div id="list_index" class="box"></div>
</div>
<script type="text/javascript">
   window.addEventListener("load", function () {
      paginator({
          get_rows: function () {
              return document.getElementById("list").getElementsByTagName("li");
          },
          box: document.getElementById("list_index"),
          active_class: "color_page"
      });
   }, false);

</script>
