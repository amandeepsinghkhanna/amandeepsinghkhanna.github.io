---
layout: home
title: "Projects"
permalink: /projects/
---
<style>
  #list{
    list-style-type: none;
  }
</style>
<script type="text/javascript" src="{{ "/assets/js/paginator.js" | relative_url }}"></script>
<div class="catalogue">
  <ul id="list">
    {% for project in site.projects %}
    <li>
      <a href="{{ project.url | prepend: site.baseurl }}" class="catalogue-item">
        <div>
          <time datetime="{{ project.date }}" class="catalogue-time">{{ project.date | date: "%B %d, %Y" }}</time>
          <h1 class="catalogue-title">{{ project.title}}</h1>
          <div class="catalogue-line"></div>
          <p>
            {{ project.content | strip_html | truncatewords: 30 }}
          </p>
        </div>
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
<div class="pagination-container">
  <div id="list_index" class="box"></div>
</div>
<script type="text/javascript">
  window.addEventListener("load", function () {
     paginator({
         get_rows: function () {
             return document.getElementById("list").getElementsByTagName("li");
         },
         box: document.getElementById("list_index"),
         active_class: "color_page"
     });
  }, false);

</script>
